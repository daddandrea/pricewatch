name: pricewatch

services:
  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
  backend:
    build: .
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - .:/app
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      - redis
  worker:
    build: .
    command: celery -A pricewatch worker -l info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
  beat:
    build: .
    command: celery -A pricewatch beat -l info
    volumes:
      - .:/app
    env_file: .env
    depends_on:
      - redis
  frontend:
    build: ./frontend
    ports:
      - "80:80"
    depends_on:
      - backend
